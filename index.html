<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Climate Adaptation Study for Urban Trees</title>
  <link rel="stylesheet" href="html5reset.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #e9f5ec, #f9f9f9);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-top: 60px;
      color: #2f4f4f;
    }

    .grid-wrapper {
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
      margin: 60px 20px;
      width: 100%;
      max-width: 900px;
    }

    @media (min-width: 768px) {
      .grid-wrapper {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }

    .grid-card {
      background-color: #ffffff;
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 30px 20px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s;
      cursor: pointer;
    }

    .grid-card:hover {
      transform: translateY(-5px);
      background-color: #f0f8f5;
    }

    .grid-card a {
      text-decoration: none;
      color: #2e5d58;
      font-size: 1.2rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Climate Adaptation Study for Urban Trees</h1>

  <div class="grid-wrapper">
    <div class="grid-card">
      <a href="tree_species_frequency.html">Tree Species Frequency by Koppen Climate Type</a>
    </div>
    <div class="grid-card">
      <a href="climate_trends_maps.html">Global Koppen Climate Trends Maps</a>
    </div>
    <div class="grid-card">
      <a href="navigation.html">Urban Trees Climate Change Adaptation Map Navigation</a>
    </div>
  </div>
</body>
</html>
